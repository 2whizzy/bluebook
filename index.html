<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bluebook — Digital SAT Simulator</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
:root{
  --bb-blue:#1c5fce;
  --bb-next:#1d4ed8;
  --ink:#1f2733;
  --muted:#5b6573;
  --line:#d9dee5;
  --bg:#f4f6f9;

  --navy:#0a1733;
  --navy2:#13245c;
  --accent:#4f7cff;
  --gold:#ffc23c;
  --paper:#f7f9fc;

  --serif:Georgia,'Times New Roman',serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:var(--sans);color:var(--ink);background:var(--bg)}
#root{min-height:100vh}
button{font-family:inherit;cursor:pointer}
.katex{font-size:1.02em}

.btn{border:1px solid var(--line);background:#fff;border-radius:999px;padding:9px 20px;font-weight:600;font-size:14px;color:var(--ink)}
.btn:hover{background:#f3f5f8}
.btn-primary{background:var(--bb-next);border-color:var(--bb-next);color:#fff}
.btn-primary:hover{background:#1740b8}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{border:1px solid var(--bb-next);color:var(--bb-next);background:#fff}
.btn-ghost:hover{background:#eef3ff}
.muted{color:var(--muted)}

/* ============ LANDING ============ */
.lp{min-height:100vh;background:var(--paper)}
.lp-nav{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;
  padding:20px 6vw;z-index:5;color:#fff}
.lp-brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:20px;letter-spacing:-.01em}
.lp-brand .star{color:var(--gold);font-size:22px}
.lp-nav a{color:#dfe6ff;text-decoration:none;font-weight:600;font-size:14px}
.lp-nav a:hover{color:#fff}

.hero{position:relative;overflow:hidden;background:
  radial-gradient(700px 380px at 12% 18%, rgba(79,124,255,.30), transparent 60%),
  radial-gradient(620px 420px at 92% 8%, rgba(255,194,60,.18), transparent 55%),
  linear-gradient(160deg,#0a1733 0%,#10204e 55%,#0b1a3c 100%);
  color:#fff;padding:118px 6vw 96px}
.hero-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:48px;align-items:center;max-width:1180px;margin:0 auto}
.eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold);font-weight:800;
  animation:fadeUp .6s both}
.hero h1{font-size:clamp(38px,5vw,62px);line-height:1.02;letter-spacing:-.025em;margin:14px 0 0;font-weight:800;
  animation:fadeUp .6s .06s both}
.hero h1 .em{background:linear-gradient(90deg,#86b0ff,#ffd874);-webkit-background-clip:text;background-clip:text;color:transparent}
.hero p.sub{font-size:18px;line-height:1.55;color:#c5d2f0;max-width:520px;margin:20px 0 30px;
  animation:fadeUp .6s .12s both}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;animation:fadeUp .6s .18s both}
.cta-lg{background:linear-gradient(90deg,#4f7cff,#3a63e6);color:#fff;border:none;border-radius:12px;
  padding:15px 28px;font-weight:700;font-size:16px;box-shadow:0 12px 30px rgba(40,80,220,.45)}
.cta-lg:hover{transform:translateY(-1px);box-shadow:0 16px 38px rgba(40,80,220,.55)}
.cta-ghost{background:rgba(255,255,255,.06);color:#fff;border:1px solid rgba(255,255,255,.28);
  border-radius:12px;padding:15px 24px;font-weight:700;font-size:16px}
.cta-ghost:hover{background:rgba(255,255,255,.13)}
.hero-stats{display:flex;gap:30px;margin-top:38px;animation:fadeUp .6s .24s both}
.hero-stats .s b{font-family:var(--serif);font-size:30px;display:block;line-height:1}
.hero-stats .s span{font-size:12.5px;color:#9fb0d8;letter-spacing:.04em}

/* hero floating mock card */
.mock-wrap{display:flex;justify-content:center;animation:fadeUp .7s .2s both}
.mock{position:relative;width:360px;background:#fff;border-radius:18px;color:var(--ink);
  box-shadow:0 40px 80px rgba(4,12,40,.55);transform:rotate(-3deg);animation:floaty 6s ease-in-out infinite;
  border:1px solid rgba(255,255,255,.6);overflow:hidden}
.mock-top{background:var(--bb-blue);color:#fff;font-size:11px;font-weight:700;padding:6px 12px;display:flex;justify-content:space-between}
.mock-body{padding:16px 18px}
.mock-qhead{display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line);padding-bottom:8px;margin-bottom:12px;font-size:12px;font-weight:700}
.mock-qnum{background:#1f2733;color:#fff;width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center}
.mock-stem{font-family:var(--serif);font-size:15px;margin-bottom:12px}
.mock-ch{display:flex;align-items:center;gap:9px;border:1px solid var(--line);border-radius:9px;padding:8px 10px;margin-bottom:8px;font-family:var(--serif);font-size:14px}
.mock-ch .b{width:20px;height:20px;border-radius:50%;border:1.5px solid #aab3c0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:var(--sans)}
.mock-ch.sel{border-color:var(--bb-next);background:#f4f8ff}
.mock-ch.sel .b{background:var(--bb-next);border-color:var(--bb-next);color:#fff}
.chip-float{position:absolute;background:#fff;border-radius:12px;padding:10px 14px;box-shadow:0 16px 34px rgba(4,12,40,.30);font-weight:800}
.chip-score{top:-22px;right:-26px;color:#0b2a66}
.chip-score b{font-family:var(--serif);font-size:26px;display:block;line-height:1}
.chip-score span{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.08em}
.chip-timer{bottom:-18px;left:-24px;color:var(--bb-next);font-size:15px;display:flex;align-items:center;gap:6px}

/* landing content */
.lp-body{max-width:1100px;margin:0 auto;padding:64px 6vw 90px}
.lp-h2{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:0 0 4px}
.lp-lead{font-size:24px;font-weight:800;letter-spacing:-.02em;margin:0 0 22px}
.type-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.type-card{position:relative;background:#fff;border:1px solid var(--line);border-radius:16px;padding:22px;
  transition:.16s;cursor:pointer;overflow:hidden}
.type-card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(20,40,90,.13);border-color:#b9c8ef}
.type-card .bar{position:absolute;left:0;top:0;bottom:0;width:5px}
.type-card .max{font-family:var(--serif);font-size:32px;font-weight:700;color:#0b2a66}
.type-card h3{margin:6px 0 4px;font-size:18px}
.type-card .d{color:var(--muted);font-size:13px;min-height:36px}
.type-card .go{margin-top:12px;font-weight:700;color:var(--bb-next);font-size:14px}

.tests-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.test-card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 20px}
.test-card .row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.test-card h4{margin:0;font-size:17px}
.tchip{font-size:11px;font-weight:800;letter-spacing:.04em;border-radius:999px;padding:3px 10px;text-transform:uppercase}
.tchip.full{background:#eef3ff;color:#1d4ed8}
.tchip.rw{background:#eafaf0;color:#1c7a3f}
.tchip.math{background:#fff2e3;color:#b5651d}
.test-meta{color:var(--muted);font-size:13px;margin:6px 0 14px;display:flex;gap:14px;flex-wrap:wrap}
.test-actions{display:flex;gap:8px;align-items:center}
.link-danger{background:none;border:none;color:#c0392b;font-weight:600;font-size:13px;margin-left:auto}
.empty{background:#fff;border:1px dashed #c3ccd9;border-radius:14px;padding:34px;text-align:center;color:var(--muted)}
.note{background:#fff8e6;border:1px solid #f3e2a8;border-radius:10px;padding:12px 14px;font-size:13px;color:#6b5a1f;margin-top:18px}

/* ============ CREATE VIEW ============ */
.create{min-height:100vh;background:var(--paper)}
.create-bar{background:#fff;border-bottom:1px solid var(--line);padding:16px 6vw;display:flex;align-items:center;gap:14px}
.back{background:none;border:none;color:var(--muted);font-weight:700;font-size:14px}
.create-inner{max-width:880px;margin:0 auto;padding:34px 24px 90px}
.field-label{font-weight:800;font-size:14px;margin:0 0 6px}
.name-input{width:100%;font-size:22px;font-weight:700;border:none;border-bottom:2px solid var(--line);
  padding:8px 2px;outline:none;background:transparent}
.name-input:focus{border-color:var(--bb-next)}
textarea.paste{width:100%;min-height:280px;border:1px solid var(--line);border-radius:12px;padding:14px;
  font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;resize:vertical;line-height:1.55}
.parse-bar{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.pill-count{background:#eef3ff;color:var(--bb-next);border-radius:999px;padding:4px 12px;font-weight:700;font-size:13px}
.pill-warn{background:#fdecec;color:#c0392b;border-radius:999px;padding:4px 12px;font-weight:700;font-size:13px}
.help{font-size:12px;color:var(--muted);line-height:1.55;white-space:pre-wrap;font-family:ui-monospace,Menlo,Consolas,monospace;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:8px}
.create-foot{position:sticky;bottom:0;background:linear-gradient(0deg,var(--paper),rgba(247,249,252,.6));
  padding:16px 0;display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

/* AI import */
.tabs{display:flex;gap:8px;margin:6px 0 18px}
.tab{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 18px;font-weight:700;font-size:14px;color:var(--muted)}
.tab.on{background:#0a1733;color:#fff;border-color:#0a1733}
.tab .ai{color:var(--gold)}
.ai-panel{background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px}
.key-box{background:#f3f7ff;border:1px solid #cfe0ff;border-radius:12px;padding:16px;margin-bottom:14px}
.key-box input{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-family:ui-monospace,monospace;font-size:13px;margin-top:8px}
.row-mini{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
select.sel{padding:8px 10px;border-radius:8px;border:1px solid var(--line);font-size:13px;font-weight:600}
.drop{border:1.5px dashed #b9c8ef;border-radius:12px;padding:18px;text-align:center;color:var(--muted);font-size:14px;cursor:pointer;background:#fafcff}
.drop:hover{background:#f1f6ff;border-color:#8fb0ff}
.err{background:#fdecec;border:1px solid #f3bcbc;color:#a23030;border-radius:10px;padding:12px 14px;font-size:13px;margin-top:12px;white-space:pre-wrap}
.spin{display:inline-block;width:16px;height:16px;border:2px solid #cdd6e4;border-top-color:var(--bb-next);border-radius:50%;animation:spin .7s linear infinite;vertical-align:-3px;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
.pv-card{border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px;background:#fff}
.pv-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pv-card input.t,.pv-card textarea.t{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:14px;font-family:var(--sans)}
.pv-card textarea.t{font-family:var(--serif);min-height:46px;resize:vertical}
.pv-choice{display:flex;align-items:center;gap:8px;margin:6px 0}
.pv-choice input.t{font-family:var(--serif)}
.pv-correct{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap}
.del-mini{background:none;border:none;color:#c0392b;font-weight:700;font-size:13px;margin-left:auto}

/* image-cut preview + image choices */
.cut-img{max-width:100%;display:block;border:1px solid #e6eaf1;border-radius:6px;background:#fff}
.pv-card .cut-stem{margin:4px 0 8px}
.pv-choice .cut-c{flex:1}
.akey textarea{width:100%;min-height:90px;border:1px solid var(--line);border-radius:10px;padding:12px;font-family:ui-monospace,monospace;font-size:13px}
.choice-img{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:11px;padding:10px 14px;background:#fff;text-align:left;width:100%}
.choice-img:hover{border-color:#9db4e8}
.choice-img.sel{border-color:var(--bb-next);box-shadow:0 0 0 1px var(--bb-next) inset;background:#f4f8ff}
.choice-img.crossed{opacity:.5}
.choice-img.crossed img{filter:grayscale(1)}
.choice-img .badge{width:26px;height:26px;border-radius:50%;border:1.5px solid #aab3c0;display:flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 auto;font-size:14px}
.choice-img.sel .badge{background:var(--bb-next);border-color:var(--bb-next);color:#fff}
.choice-img img{max-height:120px;max-width:100%}
.stem-img{max-width:100%;margin-bottom:8px}

/* answer-sheet + pdf viewer mode */
.sheet-pane{flex:0 0 44%;width:44%;overflow:auto;padding:18px 18px 60px;border-right:1px solid var(--line);background:#fafbfe}
.pdf-pane{flex:1;overflow:auto;background:#4c5663;padding:16px}
.pdf-pane img{display:block;margin:0 auto 14px;box-shadow:0 6px 22px rgba(0,0,0,.35);background:#fff;border-radius:2px}
.sheet-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.sheet-h b{font-size:15px}
.sheet-h label{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.sgroup{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;border-top:1px solid var(--line);padding-top:12px}
.sheet-row{display:flex;align-items:center;gap:12px;padding:7px 8px;border-radius:10px;transition:background .12s}
.sheet-row:hover{background:#fff}
.sheet-row.book{background:#fff7e6}
.srow-num{width:28px;font-weight:800;text-align:right;color:#41506a;font-size:15px}
.bubbles{display:flex;gap:9px}
.bubble{width:36px;height:36px;border-radius:50%;border:1.7px solid #b9c2cf;background:#fff;font-weight:700;color:#41506a;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.1s}
.bubble:hover{border-color:#8fb0ff}
.bubble.sel{background:var(--bb-next);border-color:var(--bb-next);color:#fff;box-shadow:0 4px 12px rgba(29,78,216,.35)}
.bubble.crossed{color:#c0392b;border-style:dashed;border-color:#e2a3a3;text-decoration:line-through;background:#fbeaea}
.srow-tools{margin-left:auto;display:flex;gap:4px;align-items:center}
.icon-btn{border:none;background:none;font-size:17px;cursor:pointer;color:#9aa6b6;padding:4px}
.icon-btn.on{color:#d8a200}
.zoombar{display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-bottom:12px;color:#fff;font-size:13px;position:sticky;top:0;z-index:2}
.zoombar button{width:30px;height:30px;border-radius:7px;border:none;background:rgba(255,255,255,.18);color:#fff;font-weight:800;font-size:16px}
.zoombar button:hover{background:rgba(255,255,255,.3)}
.sheet-foot{display:flex;align-items:center;gap:14px;padding:12px 18px;border-top:1px solid var(--line);position:relative}

/* ============ TEST CHROME ============ */
.test{display:flex;flex-direction:column;height:100vh;background:#fff;overflow:hidden}
.topbar{background:var(--bb-blue);color:#fff;height:34px;display:flex;align-items:center;padding:0 12px;font-size:13px;gap:8px;font-weight:600}
.topbar .star{color:#ffd34d}
.topbar .win{margin-left:auto;display:flex;gap:16px;opacity:.9}
.header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:10px 20px 4px}
.sec-name{font-weight:700;font-size:17px}
.dir{color:var(--muted);font-size:13px;margin-top:2px}
.timer-wrap{text-align:center}
.timer{font-size:22px;font-weight:700}
.timer.low{color:#c0392b}
.hide-pill{margin-top:2px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:3px 16px;font-size:12px;font-weight:600;color:var(--muted)}
.header .right{display:flex;justify-content:flex-end;align-items:center;gap:18px}
.tool{display:flex;flex-direction:column;align-items:center;font-size:11px;color:var(--ink);background:none;border:none;gap:2px}
.tool.active{color:var(--bb-next)}
.tool .ic{font-size:16px}
.battery{font-size:11px;color:var(--muted);margin-bottom:2px;text-align:right}
.dashes{height:7px;background-image:repeating-linear-gradient(90deg,#1c5fce 0 14px,transparent 14px 22px,#f4b400 22px 36px,transparent 36px 44px,#9aa6b2 44px 58px,transparent 58px 66px);opacity:.55;margin-top:4px}

.body{flex:1;display:flex;min-height:0}
.pane{flex:1;min-width:0;overflow:auto;padding:26px 30px}
.pane.left{border-right:1px solid var(--line)}
.passage{font-family:var(--serif);font-size:17px;line-height:1.7;color:#15202b}
.qhead{display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:16px}
.qnum{background:#1f2733;color:#fff;width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.mark{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:14px;font-weight:600;color:var(--ink)}
.mark .flag{font-size:15px}
.elim{margin-left:auto;border:1px solid var(--line);background:#fff;border-radius:6px;padding:3px 8px;font-weight:700;font-size:12px;color:var(--muted)}
.elim.on{background:#1f2733;color:#fff;border-color:#1f2733}
.stem{font-family:var(--serif);font-size:17px;line-height:1.6;margin-bottom:18px;display:block}
.choices{display:flex;flex-direction:column;gap:12px}
.choice{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:11px;padding:13px 14px;font-family:var(--serif);font-size:16px;background:#fff;text-align:left;width:100%}
.choice:hover{border-color:#9db4e8}
.choice.sel{border-color:var(--bb-next);box-shadow:0 0 0 1px var(--bb-next) inset;background:#f4f8ff}
.choice .badge{width:26px;height:26px;border-radius:50%;border:1.5px solid #aab3c0;display:flex;align-items:center;justify-content:center;font-weight:700;flex:0 0 auto;font-family:var(--sans);font-size:14px}
.choice.sel .badge{background:var(--bb-next);border-color:var(--bb-next);color:#fff}
.choice.crossed{opacity:.55}
.choice.crossed .ctext{text-decoration:line-through}
.strike{margin-left:auto;border:1px solid var(--line);border-radius:6px;width:24px;height:24px;font-size:11px;font-weight:700;background:#fff;color:var(--muted)}
.ctext{flex:1}

/* calculator dock (split screen) */
.calc-dock{width:40%;flex:0 0 40%;border-right:1px solid var(--line);display:flex;flex-direction:column;background:#fff}
.calc-dock .cbar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--line);background:#f7f9fc}
.calc-dock .cbody{flex:1;min-height:0}
.q-col{width:60%;flex:0 0 60%;overflow:auto;display:flex;justify-content:flex-end;padding:26px 30px}
.q-col .q-inner{width:100%;max-width:560px}

.footer{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:12px 22px;border-top:1px solid var(--line);position:relative}
.who{font-weight:700}
.navbtn{background:#1f2733;color:#fff;border:none;border-radius:8px;padding:9px 22px;font-weight:700;font-size:14px;justify-self:center}
.foot-right{display:flex;justify-content:flex-end;gap:10px}
.navpop{position:absolute;left:50%;transform:translateX(-50%);bottom:64px;width:520px;max-width:92vw;background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:0 18px 50px rgba(15,30,70,.22);padding:18px;z-index:30}
.navpop h4{margin:0 0 4px;text-align:center}
.navpop .legend{display:flex;gap:18px;justify-content:center;font-size:12px;color:var(--muted);margin-bottom:14px}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px;margin-bottom:14px}
.gcell{position:relative;height:38px;border-radius:8px;border:1.5px dashed #b9c2cf;background:#fff;font-weight:700;color:var(--ink)}
.gcell.ans{background:var(--bb-next);border-style:solid;border-color:var(--bb-next);color:#fff}
.gcell.cur{outline:2px solid #1f2733;outline-offset:2px}

<body>
<div id="root"></div>

<script type="text/babel" data-presets="env,react">
const {useState,useEffect,useRef} = React;

/* ---------- persistent storage ----------
   Works in the in-chat artifact sandbox (window.storage) AND in a downloaded
   file opened in a normal browser (localStorage). Falls back to memory. */
const mem={};
const Store={
  async get(k){
    try{ if(window.storage){ const r=await window.storage.get(k); return r?JSON.parse(r.value):null; } }catch(e){}
    try{ const v=localStorage.getItem(k); if(v!=null) return JSON.parse(v); }catch(e){}
    return mem[k]??null;
  },
  async set(k,v){
    mem[k]=v;
    try{ if(window.storage){ await window.storage.set(k,JSON.stringify(v)); return; } }catch(e){}
    try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){}
  }
};

/* ---------- math rendering ---------- */
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mathHTML(text){
  if(text==null) return '';
  return String(text).split(/(\$[^$]*\$)/g).map(p=>{
    if(p.length>1&&p[0]==='$'&&p[p.length-1]==='$'){
      try{return window.katex.renderToString(p.slice(1,-1),{throwOnError:false});}catch(e){return esc(p);}
    }
    return esc(p).replace(/\n/g,'<br/>');
  }).join('');
}
function MathText({text,className,style}){
  return <span className={className} style={style} dangerouslySetInnerHTML={{__html:mathHTML(text)}}/>;
}

/* ---------- parser ---------- */
function parseQuestions(raw, defaultSubject){
  const text=(raw||'').replace(/\r/g,'').trim();
  if(!text) return [];
  const lines=text.split('\n');
  const blocks=[]; let cur=null;
  for(const ln of lines){
    if(/^\s*\d+[.)]\s/.test(ln)){ if(cur)blocks.push(cur); cur=[ln]; }
    else if(cur) cur.push(ln);
    else cur=[ln];
  }
  if(cur)blocks.push(cur);
  const out=[];
  for(const b of blocks){
    const q={subject:defaultSubject,passage:'',stem:'',choices:[],correct:-1,explanation:''};
    let mode='stem';
    for(const line of b){
      const m=line.match(/^\s*([A-Da-d])[.)]\s+(.*)$/);
      if(/^\s*passage\s*:/i.test(line)){ q.passage+=line.replace(/^\s*passage\s*:/i,'').trim()+'\n'; mode='passage'; continue; }
      if(/^\s*subject\s*:/i.test(line)){ const s=line.split(':')[1].trim().toLowerCase(); q.subject=s.startsWith('m')?'math':'rw'; continue; }
      if(/^\s*answer\s*:/i.test(line)){ const a=line.split(':')[1].trim().toUpperCase(); q.correct='ABCD'.indexOf(a[0]); continue; }
      if(/^\s*explanation\s*:/i.test(line)){ q.explanation=line.replace(/^\s*explanation\s*:/i,'').trim(); mode='exp'; continue; }
      if(m){ q.choices.push(m[2].trim()); mode='choice'; continue; }
      const stripped=line.replace(/^\s*\d+[.)]\s*/,'');
      if(mode==='passage') q.passage+=line+'\n';
      else if(mode==='exp') q.explanation+=' '+line.trim();
      else if(mode==='choice'&&q.choices.length) q.choices[q.choices.length-1]+=' '+line.trim();
      else q.stem+=(q.stem?' ':'')+stripped.trim();
    }
    q.passage=q.passage.trim(); q.stem=q.stem.trim();
    if(q.stem&&q.choices.length>=2){ q.id='q_'+Math.random().toString(36).slice(2,9); out.push(q); }
  }
  return out;
}

/* ---------- AI parsing via Gemini (free tier / your key) ---------- */
const GEMINI_MODELS=['gemini-2.5-flash','gemini-2.5-flash-lite','gemini-3.5-flash'];

// Structured-output schema → Gemini is forced to return valid JSON in this shape.
const QSCHEMA={
  type:'ARRAY',
  items:{
    type:'OBJECT',
    properties:{
      subject:{type:'STRING',enum:['math','rw']},
      passage:{type:'STRING'},
      stem:{type:'STRING'},
      choices:{type:'ARRAY',items:{type:'STRING'}},
      correct:{type:'INTEGER'},
      explanation:{type:'STRING'}
    },
    required:['subject','stem','choices','correct']
  }
};

function normalizeAIQuestions(arr,type){
  if(!Array.isArray(arr)) return [];
  return arr.map(r=>{
    let subject=(r.subject==='math'||r.subject==='rw')?r.subject:'rw';
    if(type!=='full') subject=type;
    let choices=Array.isArray(r.choices)?r.choices.map(c=>String(c)).filter(c=>c.trim()):[];
    let correct=Number.isInteger(r.correct)?r.correct
      :(typeof r.answer==='string'?'ABCD'.indexOf(r.answer.trim().toUpperCase()[0]):-1);
    return {
      id:'q_'+Math.random().toString(36).slice(2,9),
      subject,
      passage:r.passage?String(r.passage):'',
      stem:r.stem?String(r.stem):'',
      choices,
      correct:(correct>=0&&correct<choices.length)?correct:0,
      explanation:r.explanation?String(r.explanation):''
    };
  }).filter(q=>q.stem && q.choices.length>=2);
}

// Recover questions even if the model output was cut off mid-array.
function salvageJSONArray(s){
  s=(s||'').replace(/```json/gi,'').replace(/```/g,'').trim();
  const start=s.indexOf('['); if(start<0) throw new Error('no array');
  s=s.slice(start);
  try{ return JSON.parse(s); }catch(e){}
  const lastObj=s.lastIndexOf('}');
  if(lastObj>0){ try{ return JSON.parse(s.slice(0,lastObj+1)+']'); }catch(e){} }
  throw new Error('unparseable');
}

// Split big documents into segments so the model never has to emit one giant reply.
function chunkText(text,budget){
  const paras=text.split(/\n\s*\n/);
  const chunks=[]; let cur='';
  for(const p of paras){
    if(cur && cur.length+p.length+2>budget){ chunks.push(cur); cur=''; }
    cur += (cur?'\n\n':'')+p;
    if(cur.length>budget*1.7){ chunks.push(cur); cur=''; }
  }
  if(cur.trim()) chunks.push(cur);
  return chunks.length?chunks:[text];
}

async function aiParseSegment({text,type,key,model}){
  const subjectRule = type==='full'
    ? 'Decide each question\'s subject yourself: "math" for anything quantitative (algebra, geometry, data, functions); "rw" for reading, grammar, and vocabulary.'
    : `Every question\'s subject is "${type}".`;
  const prompt =
`You are an intelligent exam parser. Read the raw, messy text below (it may come from an OCR\'d or badly formatted PDF) and reconstruct every genuine multiple-choice question as clean data.

For each real question:
- ${subjectRule}
- Write a clean, grammatical "stem" (the question being asked). FIX spelling, OCR, spacing, and punctuation errors WITHOUT changing the meaning. Make it as clear as possible.
- Provide exactly 4 cleaned "choices" with NO letter labels (no "A)"/"B."). If the source shows more or fewer, choose or merge to the 4 best options. Fix obvious typos in choices too.
- Set "correct" to the 0-based index (0,1,2,3) of the correct choice. Use any answer key in the text, even if it appears elsewhere and is matched by question number. If the answer is genuinely not provided, set "correct" to 0 and "explanation" to "answer not provided".
- "passage": the reading passage or setup text for R&W questions; "" if none.
- "explanation": one short sentence why the answer is right; "" if unknown.
- Wrap ALL mathematics in LaTeX between single dollar signs (e.g. $x^2$, $\\frac{3}{4}$, $\\sqrt{49}$). Leave plain English unwrapped.

Ignore everything that is NOT a question: page numbers, running headers/footers, instructions, section titles, logos, and decorative text. Keep questions in their original order.

RAW TEXT:
"""
${text}
"""`;

  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`;
  let res;
  try{
    res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{role:'user',parts:[{text:prompt}]}],
        generationConfig:{temperature:0,responseMimeType:'application/json',responseSchema:QSCHEMA,maxOutputTokens:16384}
      })});
  }catch(e){
    throw new Error('NETWORK: The browser could not reach Google. This usually means the in-chat preview\'s sandbox blocked the request \u2014 download the file and open it in a normal browser, or check your connection.');
  }
  if(!res.ok){
    let detail=''; try{detail=(await res.json())?.error?.message||'';}catch(e){}
    if(res.status===400||res.status===403) throw new Error('KEY: Google rejected the request ('+res.status+'). Your key looks invalid or lacks access \u2014 use one starting with "AIza" from aistudio.google.com. '+detail);
    if(res.status===404) throw new Error('MODEL: Model "'+model+'" not found for this key. Pick another in the dropdown. '+detail);
    if(res.status===429) throw new Error('QUOTA: Free-tier rate limit hit (429). Wait a minute or switch to gemini-2.5-flash-lite. '+detail);
    throw new Error('HTTP '+res.status+': '+detail);
  }
  const data=await res.json();
  const cand=data?.candidates?.[0];
  let out=cand?.content?.parts?.map(p=>p.text||'').join('')||'';
  let arr;
  try{ arr=salvageJSONArray(out); }
  catch(e){ throw new Error('PARSE: Could not read the AI\'s reply for one segment. Try again, switch model, or use the formatted-paste tab.'); }
  return normalizeAIQuestions(arr,type);
}

// Top-level: chunk if large, parse each segment, merge.
async function aiParse({text,type,key,model,onProgress}){
  const chunks = text.length>6000 ? chunkText(text,6000) : [text];
  let all=[];
  for(let i=0;i<chunks.length;i++){
    if(onProgress) onProgress(i+1,chunks.length);
    const qs=await aiParseSegment({text:chunks[i],type,key,model});
    all=all.concat(qs);
  }
  return all;
}

/* ---------- PDF text extraction (pdf.js, loaded on demand) ---------- */
let _pdfjsPromise=null;
function loadPdfJs(){
  if(window.pdfjsLib) return Promise.resolve(window.pdfjsLib);
  if(_pdfjsPromise) return _pdfjsPromise;
  _pdfjsPromise=new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload=()=>{ try{ window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; resolve(window.pdfjsLib);}catch(e){reject(e);} };
    s.onerror=()=>reject(new Error('Could not load the PDF reader (likely blocked by the preview sandbox). Download the file and open it in a browser, or copy-paste the text instead.'));
    document.body.appendChild(s);
  });
  return _pdfjsPromise;
}
async function extractPdfText(file){
  const pdfjsLib=await loadPdfJs();
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let text='';
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const content=await page.getTextContent();
    text += content.items.map(i=>i.str).join(' ')+'\n\n';
  }
  return text.trim();
}

/* ---------- PDF -> page canvases (for visual cutting) ---------- */
async function renderPdfPageCanvas(page,targetW){
  const v1=page.getViewport({scale:1});
  const scale=targetW/v1.width;
  const vp=page.getViewport({scale});
  const canvas=document.createElement('canvas');
  canvas.width=Math.round(vp.width); canvas.height=Math.round(vp.height);
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  return canvas;
}
async function pdfToCanvases(file,onProgress){
  const pdfjsLib=await loadPdfJs();
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const out=[];
  for(let p=1;p<=pdf.numPages;p++){
    if(onProgress) onProgress(p,pdf.numPages);
    const page=await pdf.getPage(p);
    out.push(await renderPdfPageCanvas(page,1500));   // hi-res for crisp crops
  }
  return out;
}
function canvasToJpeg(canvas,maxW,q){
  let c=canvas;
  if(canvas.width>maxW){
    c=document.createElement('canvas');
    const s=maxW/canvas.width; c.width=maxW; c.height=Math.round(canvas.height*s);
    c.getContext('2d').drawImage(canvas,0,0,c.width,c.height);
  }
  return c.toDataURL('image/jpeg',q||0.8);
}
// box = [ymin,xmin,ymax,xmax] in 0-1000 normalized; crop from full-res canvas
function cropBox(canvas,box,maxW){
  if(!Array.isArray(box)||box.length<4) return null;
  const [ymin,xmin,ymax,xmax]=box;
  const W=canvas.width,H=canvas.height,pad=6;
  let x=Math.max(0,Math.round(xmin/1000*W)-pad);
  let y=Math.max(0,Math.round(ymin/1000*H)-pad);
  let w=Math.min(W-x,Math.round((xmax-xmin)/1000*W)+pad*2);
  let h=Math.min(H-y,Math.round((ymax-ymin)/1000*H)+pad*2);
  if(w<6||h<6) return null;
  const c=document.createElement('canvas'); c.width=w; c.height=h;
  c.getContext('2d').drawImage(canvas,x,y,w,h,0,0,w,h);
  return canvasToJpeg(c,maxW||760,0.82);
}

/* ---------- Gemini VISION: detect question/choice regions on a page ---------- */
const BOXSCHEMA={
  type:'ARRAY',
  items:{type:'OBJECT',properties:{
    number:{type:'INTEGER'},
    subject:{type:'STRING',enum:['math','rw']},
    passage_box:{type:'ARRAY',items:{type:'INTEGER'}},
    stem_box:{type:'ARRAY',items:{type:'INTEGER'}},
    choices:{type:'ARRAY',items:{type:'ARRAY',items:{type:'INTEGER'}}}
  },required:['number','stem_box','choices']}
};
async function detectPageBoxes({jpegBase64,type,key,model}){
  const subjectRule = type==='full'
    ? 'Also classify each question\'s "subject": "math" (quantitative) or "rw" (reading/writing).'
    : `Set every "subject" to "${type}".`;
  const prompt=
`This is ONE page image from an exam PDF. Find every multiple-choice QUESTION on the page and return its layout regions as bounding boxes so they can be cropped out.

For each question return:
- "number": the printed question number (integer).
- ${subjectRule}
- "stem_box": the box around the question text being asked.
- "choices": an array of boxes, ONE per answer option, in order (A,B,C,D...). Each option box should tightly contain that single option's text/graphic, WITHOUT its letter label if possible.
- "passage_box": the box around the reading passage / setup text if the question has one, otherwise omit it.

Bounding boxes are [ymin, xmin, ymax, xmax] as integers 0-1000, normalized to the image height and width.
Ignore page numbers, running headers/footers, section titles, and instructions. If there are no questions on this page, return [].`;
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${encodeURIComponent(key)}`;
  let res;
  try{
    res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        contents:[{role:'user',parts:[
          {inline_data:{mime_type:'image/jpeg',data:jpegBase64}},
          {text:prompt}
        ]}],
        generationConfig:{temperature:0,responseMimeType:'application/json',responseSchema:BOXSCHEMA,maxOutputTokens:8192}
      })});
  }catch(e){
    throw new Error('NETWORK: The browser could not reach Google. The in-chat preview\'s sandbox blocks this \u2014 run the deployed site or the downloaded file in a normal browser.');
  }
  if(!res.ok){
    let detail=''; try{detail=(await res.json())?.error?.message||'';}catch(e){}
    if(res.status===400||res.status===403) throw new Error('KEY: Google rejected the request ('+res.status+'). Use a valid "AIza" key from aistudio.google.com. '+detail);
    if(res.status===404) throw new Error('MODEL: "'+model+'" not available (or no vision support) for this key. Try gemini-2.5-flash. '+detail);
    if(res.status===429) throw new Error('QUOTA: Rate/quota limit (429). Wait, or switch to gemini-2.5-flash-lite. '+detail);
    throw new Error('HTTP '+res.status+': '+detail);
  }
  const data=await res.json();
  let out=data?.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'';
  try{ return salvageJSONArray(out); }catch(e){ return []; }
}

// Orchestrate: render pages -> detect -> crop -> image question objects
async function cutQuestionsFromPdf({file,type,key,model,onProgress}){
  const canvases=await pdfToCanvases(file,(p,n)=>onProgress&&onProgress('render',p,n));
  const questions=[];
  for(let i=0;i<canvases.length;i++){
    onProgress&&onProgress('detect',i+1,canvases.length);
    const canvas=canvases[i];
    const jpeg=canvasToJpeg(canvas,1100,0.85).split(',')[1];
    let boxes=[];
    try{ boxes=await detectPageBoxes({jpegBase64:jpeg,type,key,model}); }catch(e){ if(i===0) throw e; }
    for(const b of (boxes||[])){
      const stemImg=cropBox(canvas,b.stem_box,820);
      const choiceImgs=(b.choices||[]).map(cb=>cropBox(canvas,cb,560)).filter(Boolean);
      if(!stemImg||choiceImgs.length<2) continue;
      const passageImg = b.passage_box ? cropBox(canvas,b.passage_box,820) : '';
      questions.push({
        id:'q_'+Math.random().toString(36).slice(2,9),
        kind:'image',
        number: Number.isInteger(b.number)?b.number:(questions.length+1),
        subject: type!=='full' ? type : (b.subject==='math'?'math':'rw'),
        passageImg: passageImg||'',
        stemImg, choiceImgs, correct:null, page:i+1
      });
    }
  }
  return questions;
}

/* ---------- answer key parsing (paired by question number) ---------- */
function parseAnswerKey(text){
  const map={};
  const re=/(\d{1,3})\s*[.):\-]?\s*([A-Ha-h])\b/g; let m;
  while((m=re.exec(text||''))){ map[parseInt(m[1],10)]='ABCDEFGH'.indexOf(m[2].toUpperCase()); }
  return map;
}

/* ---------- multi-answer key (one question per line; several accepted answers ok) ---------- */
function parseMultiAnswerKey(text){
  const map={};
  (text||'').split('\n').forEach(line=>{
    const nm=line.match(/^\s*(\d{1,3})/); if(!nm) return;
    const num=parseInt(nm[1],10);
    const rest=line.slice(line.indexOf(nm[1])+nm[1].length);
    let letters=[]; const re=/(?:^|[^A-Za-z])([A-H])(?![A-Za-z])/g; let mm;
    while((mm=re.exec(rest))) letters.push('ABCDEFGH'.indexOf(mm[1]));
    if(!letters.length){ letters=(rest.match(/[A-H]/g)||[]).map(c=>'ABCDEFGH'.indexOf(c)); }
    letters=Array.from(new Set(letters)).filter(x=>x>=0).sort((a,b)=>a-b);
    if(letters.length) map[num]=letters;
  });
  return map;
}
const SHEET_TIME={rw:64*60,math:70*60,full:134*60};  // total time by test type
function dataURLToUint8(dataURL){
  const b64=(dataURL||'').split(',')[1]||''; const bin=atob(b64);
  const arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return arr;
}

/* ---------- timing + modules + scoring ---------- */
const TIME={rw:32*60,math:35*60};
function buildModules(questions){
  const rw=questions.filter(q=>q.subject==='rw');
  const math=questions.filter(q=>q.subject==='math');
  const split=a=>{const h=Math.ceil(a.length/2);return [a.slice(0,h),a.slice(h)];};
  const mods=[];
  const add=(arr,subject)=>{const [a,b]=split(arr);
    if(a.length)mods.push({subject,moduleNum:1,time:TIME[subject],questions:a});
    if(b.length)mods.push({subject,moduleNum:2,time:TIME[subject],questions:b});};
  add(rw,'rw'); add(math,'math');
  return mods;
}
function scaleSubject(raw,total){
  if(total<=0) return 200;
  const pct=raw/total;
  const s=200+600*Math.pow(pct,0.92);
  return Math.max(200,Math.min(800,Math.round(s/10)*10));
}

const flag=(f)=> <span style={{color:f?'#d8a200':'#1f2733'}}>{f?'⚑':'⚐'}</span>;

/* ---------- seed demo test (a saved test, not a shared bank) ---------- */
const DEMO={ id:'demo', name:'Demo Test — R&W + Math', type:'full', createdAt:Date.now(), questions:[
  {id:'d1',subject:'rw',
   passage:"The following text is from Herman Melville's 1854 novel The Lightning-rod Man.\n\nThe stranger still stood in the exact middle of the cottage, where he had first planted himself. His singularity impelled a closer scrutiny. A lean, gloomy figure. Hair dark and lank, mattedly streaked over his brow. His sunken pitfalls of eyes were ringed by indigo halos, and played with an innocuous sort of lightning: the gleam without the bolt. The whole man was dripping.",
   stem:'Which choice best states the function of the underlined sentence ("His singularity impelled a closer scrutiny") in the overall structure of the text?',
   choices:["It elaborates on the previous sentence’s description of the character.","It introduces the setting that is described in the sentences that follow.","It establishes a contrast with the description in the previous sentence.","It sets up the character description presented in the sentences that follow."],
   correct:3, explanation:'The sentence announces that the stranger warrants closer inspection; the following sentences provide that detailed description.'},
  {id:'d2',subject:'rw',
   passage:'While honeybees are famous pollinators, recent studies show that wild solitary bees, which do not live in hives, ________ a substantial share of the pollination for many native plants.',
   stem:'Which choice completes the text so that it conforms to the conventions of Standard English?',
   choices:['performs','performing','perform','to perform'], correct:2,
   explanation:'The plural subject "wild solitary bees" requires the plural verb "perform."'},
  {id:'d3',subject:'math', stem:'If $3x + 7 = 22$, what is the value of $x$?',
   choices:['$3$','$5$','$7$','$15$'], correct:1, explanation:'$3x = 15$, so $x = 5$.'},
  {id:'d4',subject:'math', stem:'A line passes through $(2,3)$ and $(6,11)$. What is its slope?',
   choices:['$2$','$\\tfrac{1}{2}$','$4$','$8$'], correct:0, explanation:'slope $=\\frac{11-3}{6-2}=2$.'},
  {id:'d5',subject:'math', stem:'If $x^2 - 5x + 6 = 0$ and $x > 2$, what is $x$?',

]};

/* ============================================================
   COUNT-UP (hero)
   ============================================================ */
function CountUp({to,dur=1500}){
  const [n,setN]=useState(0);
  useEffect(()=>{
    const reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if(reduce){setN(to);return;}
    let raf,start;
    const step=t=>{ if(!start)start=t; const p=Math.min(1,(t-start)/dur);
      setN(Math.round(to*(1-Math.pow(1-p,3)))); if(p<1)raf=requestAnimationFrame(step); };
    raf=requestAnimationFrame(step); return ()=>cancelAnimationFrame(raf);
  },[to]);
  return <span>{n}</span>;
}

/* ============================================================
   CREATE VIEW
   ============================================================ */
function CreateView({type,onCancel,onSave}){
  const [name,setName]=useState('');
  const [tab,setTab]=useState('sheet');        // 'sheet' | 'pdf' | 'ai' | 'manual'
  const [paste,setPaste]=useState('');
  const nameRef=useRef(null);
  const fileRef=useRef(null);
  const pdfRef=useRef(null);
  const sheetRef=useRef(null);
  useEffect(()=>{ nameRef.current&&nameRef.current.focus(); },[]);

  // AI / shared state
  const [key,setKey]=useState('');
  const [keySaved,setKeySaved]=useState(false);
  const [model,setModel]=useState(GEMINI_MODELS[0]);
  const [rawText,setRawText]=useState('');
  const [busy,setBusy]=useState('');           // '', 'pdf', 'ai', 'cut'
  const [prog,setProg]=useState('');
  const [err,setErr]=useState('');
  const [aiQs,setAiQs]=useState([]);           // editable AI (text) preview
  const [imgQs,setImgQs]=useState([]);         // editable image-cut preview
  const [akey,setAkey]=useState('');           // answer key text (cut mode)
  const [keyMsg,setKeyMsg]=useState('');

  // answer-sheet mode state
  const [sheetPdf,setSheetPdf]=useState(null); // {dataURL,name,mb}
  const [sheetKeyText,setSheetKeyText]=useState('');
  const [rwCount,setRwCount]=useState('');
  const sheetMap=parseMultiAnswerKey(sheetKeyText);
  const sheetNums=Object.keys(sheetMap).map(Number).sort((a,b)=>a-b);
  const sheetValid = name.trim().length>0 && !!sheetPdf && sheetNums.length>0;

  useEffect(()=>{(async()=>{
    const k=await Store.get('gemini_key'); const m=await Store.get('gemini_model');
    if(k){ setKey(k); setKeySaved(true); } if(m) setModel(m);
  })();},[]);

  const def = type==='math'?'math':'rw';
  let manualParsed = parseQuestions(paste,def);
  if(type!=='full') manualParsed = manualParsed.map(q=>({...q,subject:type}));

  const parsed = tab==='ai' ? aiQs : tab==='pdf' ? imgQs : manualParsed;
  const rwN=parsed.filter(q=>q.subject==='rw').length;
  const mathN=parsed.filter(q=>q.subject==='math').length;
  const valid = name.trim().length>0 && parsed.length>0;
  const canSave = tab==='sheet' ? sheetValid : valid;

  const fmt = type==='math'
    ? `Subject: math\n1. If $2x = 10$, what is $x$?\nA) 2\nB) 5\nC) 8\nD) 10\nAnswer: B`
    : type==='rw'
    ? `Passage: Researchers found that octopuses can solve puzzles...\n1. The passage mainly serves to...\nA) ...\nB) ...\nC) ...\nD) ...\nAnswer: B`
    : `Subject: rw\nPassage: ...\n1. ...\nA) ...\nB) ...\nC) ...\nD) ...\nAnswer: C\n\nSubject: math\n2. If $x^2 = 49$, what is $x$?\nA) $7$ only\nB) $-7$ only\nC) $7$ or $-7$\nD) $0$\nAnswer: C`;

  async function saveKey(){
    if(!key.trim()) return;
    await Store.set('gemini_key',key.trim()); await Store.set('gemini_model',model);
    setKeySaved(true); setErr('');
  }
  async function onPickFile(e){
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    setErr(''); setBusy('pdf');
    try{
      if(/\.pdf$/i.test(f.name)){ const t=await extractPdfText(f); setRawText(prev=>(prev?prev+'\n\n':'')+t); }
      else { const t=await f.text(); setRawText(prev=>(prev?prev+'\n\n':'')+t); }
    }catch(e2){ setErr(e2.message||String(e2)); }
    setBusy(''); if(fileRef.current) fileRef.current.value='';
  }
  async function runAI(){
    setErr('');
    if(!key.trim()){ setErr('Enter your Gemini API key first.'); return; }
    if(!rawText.trim()){ setErr('Paste or upload some question text first.'); return; }
    setBusy('ai'); setProg('');
    try{
      const qs=await aiParse({text:rawText,type,key:key.trim(),model,
        onProgress:(i,n)=>setProg(n>1?`segment ${i} of ${n}`:'')});
      if(!qs.length) setErr('The AI returned no usable questions. Check the text, switch model, or use the formatted-paste tab.');
      setAiQs(qs);
    }catch(e){ setErr(e.message||String(e)); setAiQs([]); }
    setBusy(''); setProg('');
  }
  // preview editing helpers (text/AI)
  const upd=(i,patch)=>setAiQs(qs=>qs.map((q,j)=>j===i?{...q,...patch}:q));
  const updChoice=(i,ci,v)=>setAiQs(qs=>qs.map((q,j)=>j===i?{...q,choices:q.choices.map((c,k)=>k===ci?v:c)}:q));
  const delQ=(i)=>setAiQs(qs=>qs.filter((_,j)=>j!==i));

  // image-cut handlers
  async function onPickPdf(e){
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    setErr(''); setKeyMsg('');
    if(!key.trim()){ setErr('Enter your Gemini API key first.'); if(pdfRef.current)pdfRef.current.value=''; return; }
    setBusy('cut'); setProg('');
    try{
      const qs=await cutQuestionsFromPdf({file:f,type,key:key.trim(),model,
        onProgress:(phase,i,n)=>setProg(phase==='render'?`rendering page ${i}/${n}`:`reading page ${i}/${n}`)});
      if(!qs.length) setErr('No questions were detected. Make sure the PDF shows multiple-choice questions clearly, or try gemini-2.5-flash.');
      setImgQs(qs);
      if(akey.trim()) applyKeyTo(qs,akey);
    }catch(e2){ setErr(e2.message||String(e2)); setImgQs([]); }
    setBusy(''); setProg(''); if(pdfRef.current)pdfRef.current.value='';
  }
  function applyKeyTo(qs,text){
    const map=parseAnswerKey(text);
    let matched=0;
    const next=qs.map(q=>{ if(map[q.number]!=null){ matched++; return {...q,correct:map[q.number]}; } return q; });
    setImgQs(next);
    setKeyMsg(Object.keys(map).length? `Matched ${matched} of ${qs.length} questions to answers.` : 'No answers found in that text.');
  }
  const delImg=(i)=>setImgQs(qs=>qs.filter((_,j)=>j!==i));
  const updImg=(i,patch)=>setImgQs(qs=>qs.map((q,j)=>j===i?{...q,...patch}:q));

  // answer-sheet PDF picker (store the PDF itself; no AI needed)
  function onPickSheetPdf(e){
    const f=e.target.files&&e.target.files[0]; if(!f) return;
    setErr('');
    const r=new FileReader();
    r.onload=()=>{ setSheetPdf({dataURL:r.result,name:f.name,mb:(f.size/1048576)}); };
    r.onerror=()=>setErr('Could not read that PDF.');
    r.readAsDataURL(f);
    if(sheetRef.current) sheetRef.current.value='';
  }

  function save(start){
    if(tab==='sheet'){
      if(!sheetValid) return;
      const maxIdx=Math.max(0,...sheetNums.map(n=>Math.max(...sheetMap[n])));
      const optionsPerQuestion=Math.min(8,Math.max(4,maxIdx+1));
      const rc = type==='full' ? (parseInt(rwCount,10)||Math.ceil(sheetNums.length/2)) : 0;
      onSave({id:'t_'+Date.now(),name:name.trim(),type,createdAt:Date.now(),format:'sheet',
        pdfData:sheetPdf.dataURL, numbers:sheetNums, answerKey:sheetMap, optionsPerQuestion, rwCount:rc},start);
      return;
    }
    if(!valid) return;
    onSave({id:'t_'+Date.now(),name:name.trim(),type,createdAt:Date.now(),questions:parsed},start);
  }

  function KeyBox(){
    return !keySaved ? (
      <div className="key-box">
        <b>Connect Gemini (free)</b>
        <div className="muted" style={{fontSize:13,margin:'4px 0'}}>Get a key at <b>aistudio.google.com → Get API key</b>. It starts with <code>AIza…</code> and is saved only in this browser.</div>
        <input type="password" placeholder="Paste your Gemini API key (AIza…)" value={key} onChange={e=>setKey(e.target.value)} />
        <div className="row-mini" style={{marginTop:10}}>
          <label className="muted" style={{fontSize:13}}>Model</label>
          <select className="sel" value={model} onChange={e=>setModel(e.target.value)}>
            {GEMINI_MODELS.map(m=><option key={m} value={m}>{m}</option>)}
          </select>
          <button className="btn btn-primary" onClick={saveKey} disabled={!key.trim()}>Save key</button>
        </div>
      </div>
    ) : (
      <div className="row-mini" style={{marginBottom:14}}>
        <span className="pill-count">✓ Gemini connected</span>
        <select className="sel" value={model} onChange={async e=>{setModel(e.target.value);await Store.set('gemini_model',e.target.value);}}>
          {GEMINI_MODELS.map(m=><option key={m} value={m}>{m}</option>)}
        </select>
        <button className="btn" onClick={()=>setKeySaved(false)}>Change key</button>
      </div>
    );
  }

  return (
    <div className="create">
      <div className="create-bar">
        <button className="back" onClick={onCancel}>← Back</button>
        <span className={'tchip '+type}>{TYPES[type].name}</span>
        <span className="muted" style={{fontSize:14}}>New test</span>
      </div>
      <div className="create-inner">
        <div className="field-label">Test name</div>
        <input ref={nameRef} className="name-input" placeholder="e.g. Practice Test 4"
          value={name} onChange={e=>setName(e.target.value)} />

        <div className="field-label" style={{marginTop:28}}>Add questions</div>
        <div className="tabs">
          <button className={'tab'+(tab==='sheet'?' on':'')} onClick={()=>setTab('sheet')}><span className="ai">▦</span> PDF + answer sheet</button>
          <button className={'tab'+(tab==='pdf'?' on':'')} onClick={()=>setTab('pdf')}><span className="ai">✂</span> Cut from PDF</button>
          <button className={'tab'+(tab==='ai'?' on':'')} onClick={()=>setTab('ai')}><span className="ai">✦</span> AI parse (text)</button>
          <button className={'tab'+(tab==='manual'?' on':'')} onClick={()=>setTab('manual')}>Formatted paste</button>
        </div>

        {tab==='sheet' ? (
          <div className="ai-panel">
            <div className="muted" style={{fontSize:13,marginBottom:12}}>Your PDF is shown beside a digital answer sheet — read the questions and choices on the PDF, bubble your answers on the sheet. No AI or key needed.</div>
            <div className="drop" onClick={()=>sheetRef.current&&sheetRef.current.click()}>
              {sheetPdf
                ? <span>▦ <b>{sheetPdf.name}</b> loaded ({sheetPdf.mb.toFixed(1)} MB) — click to replace</span>
                : <span>▦ Click to choose the PDF that has your questions & choices</span>}
            </div>
            <input ref={sheetRef} type="file" accept=".pdf,application/pdf" style={{display:'none'}} onChange={onPickSheetPdf}/>
            {sheetPdf && sheetPdf.mb>3.5 && <div className="note" style={{marginTop:8}}>This PDF is large ({sheetPdf.mb.toFixed(1)} MB). Browser storage caps around 5 MB, so it may not save permanently — use a smaller PDF or the cloud-storage option for big files.</div>}

            <div className="akey" style={{marginTop:16}}>
              <div className="field-label">Answer key — this also sets how many questions appear</div>
              <textarea placeholder={"One question per line. Multiple accepted answers are allowed:\n1: B\n2: A, C      (either A or C counts correct)\n3: D\n4: A or D"}
                value={sheetKeyText} onChange={e=>setSheetKeyText(e.target.value)} />
            </div>

            {type==='full' && (
              <div className="row-mini" style={{marginTop:12}}>
                <label className="muted" style={{fontSize:13}}>How many of these are Reading & Writing? (the rest are Math)</label>
                <input className="sel" style={{width:80}} type="number" min="0" max={sheetNums.length}
                  placeholder={Math.ceil(sheetNums.length/2)} value={rwCount} onChange={e=>setRwCount(e.target.value)}/>
              </div>
            )}

            <div className="parse-bar">
              {sheetNums.length>0
                ? <><span className="pill-count">{sheetNums.length} questions</span>
                    {sheetNums.some(n=>sheetMap[n].length>1) && <span className="pill-count">multi-answer keys detected</span>}</>
                : <span className="pill-warn">Add answers to set the questions</span>}
              <span className="muted" style={{fontSize:12}}>Timing: {type==='rw'?'64 min':type==='math'?'70 min':'64 min R&W + 15-min break + 70 min Math'} for a {TYPES[type].name} test.</span>
            </div>
          </div>
        ) : tab==='manual' ? (
          <>
            <textarea className="paste" placeholder="Paste all questions here, in the supported format…"
              value={paste} onChange={e=>setPaste(e.target.value)} />
            <details style={{marginTop:10}}>
              <summary className="muted" style={{cursor:'pointer'}}>Show expected format</summary>
              <div className="help">{fmt}</div>
            </details>
          </>
        ) : tab==='pdf' ? (
          <div className="ai-panel">
            {KeyBox()}
            <div className="drop" onClick={()=>!busy&&pdfRef.current&&pdfRef.current.click()}>
              {busy==='cut'
                ? <span><span className="spin"/>Cutting… {prog}</span>
                : <span>✂ Click to choose a PDF — the AI finds each question, its choices, and any passage, then crops them out as images.</span>}
            </div>
            <input ref={pdfRef} type="file" accept=".pdf,application/pdf" style={{display:'none'}} onChange={onPickPdf}/>

            <div className="akey" style={{marginTop:14}}>
              <div className="field-label">Answer key (paired by question number)</div>
              <textarea placeholder={"One per line or comma-separated, any of these:\n1. B\n2 A\n3) C\n— or —  1:B, 2:A, 3:C"}
                value={akey} onChange={e=>setAkey(e.target.value)} />
              <div className="row-mini" style={{marginTop:8}}>
                <button className="btn" disabled={!imgQs.length||!akey.trim()} onClick={()=>applyKeyTo(imgQs,akey)}>Apply answers</button>
                {keyMsg && <span className="pill-count">{keyMsg}</span>}
              </div>
            </div>

            {err && <div className="err">{err}</div>}

            {imgQs.length>0 && <div className="row-mini" style={{margin:'14px 0 4px'}}>
              <span className="pill-count">{imgQs.length} questions cut</span>
              <span className="muted" style={{fontSize:12}}>Check each crop below — delete any the AI got wrong.</span>
            </div>}

            {imgQs.map((q,i)=>(
              <div className="pv-card" key={q.id}>
                <div className="pv-head">
                  <span className="qnum" style={{width:24,height:24,fontSize:12}}>{q.number}</span>
                  {type==='full' && (
                    <select className="sel" value={q.subject} onChange={e=>updImg(i,{subject:e.target.value})}>
                      <option value="rw">R&W</option><option value="math">Math</option>
                    </select>
                  )}
                  <span className="muted" style={{fontSize:12}}>p.{q.page} · {q.correct==null?'no answer yet':'answer '+'ABCD'[q.correct]}</span>
                  <button className="del-mini" onClick={()=>delImg(i)}>Delete</button>
                </div>
                {q.passageImg && <img className="cut-img cut-stem" src={q.passageImg} alt="passage"/>}
                <img className="cut-img cut-stem" src={q.stemImg} alt="question"/>
                {q.choiceImgs.map((src,ci)=>(
                  <div className="pv-choice" key={ci}>
                    <span className="badge" style={{width:22,height:22,fontSize:12}}>{'ABCD'[ci]}</span>
                    <img className="cut-img cut-c" src={src} alt={'choice '+'ABCD'[ci]}/>
                    <label className="pv-correct"><input type="radio" name={'c'+q.id} checked={q.correct===ci} onChange={()=>updImg(i,{correct:ci})}/> correct</label>
                  </div>
                ))}
              </div>
            ))}
          </div>
        ) : (
          <div className="ai-panel">
            {KeyBox()}
            <div className="drop" onClick={()=>fileRef.current&&fileRef.current.click()}>
              {busy==='pdf' ? <span><span className="spin"/>Reading file…</span>

            </div>
            <input ref={fileRef} type="file" accept=".pdf,.txt,text/plain" style={{display:'none'}} onChange={onPickFile}/>

            <textarea className="paste" style={{marginTop:12,minHeight:180}}
