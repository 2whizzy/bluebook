                {busy==='ai'? <><span className="spin"/>Parsing{prog?' '+prog:''}…</> : '✦ Parse with AI'}
              </button>
              {aiQs.length>0 && <span className="pill-count">{aiQs.length} parsed — edit below if needed</span>}
            </div>

            {err && <div className="err">{err}</div>}

            {aiQs.map((q,i)=>(
              <div className="pv-card" key={q.id}>
                <div className="pv-head">
                  <span className="qnum" style={{width:24,height:24,fontSize:12}}>{i+1}</span>
                  {type==='full' && (
                    <select className="sel" value={q.subject} onChange={e=>upd(i,{subject:e.target.value})}>
                      <option value="rw">R&W</option><option value="math">Math</option>
                    </select>
                  )}
                  <button className="del-mini" onClick={()=>delQ(i)}>Delete</button>
                </div>
                {(q.subject==='rw') && <textarea className="t" style={{marginBottom:8}} placeholder="Passage (optional)"
                  value={q.passage} onChange={e=>upd(i,{passage:e.target.value})}/>}
                <textarea className="t" placeholder="Question stem" value={q.stem} onChange={e=>upd(i,{stem:e.target.value})}/>
                {q.choices.map((c,ci)=>(
                  <div className="pv-choice" key={ci}>
                    <span className="badge" style={{width:22,height:22,fontSize:12}}>{'ABCD'[ci]}</span>
                    <input className="t" value={c} onChange={e=>updChoice(i,ci,e.target.value)}/>
                    <label className="pv-correct"><input type="radio" name={'c'+q.id} checked={q.correct===ci} onChange={()=>upd(i,{correct:ci})}/> correct</label>
                  </div>
                ))}
                <input className="t" style={{marginTop:8}} placeholder="Explanation (optional)" value={q.explanation} onChange={e=>upd(i,{explanation:e.target.value})}/>
              </div>
            ))}
          </div>
        )}

        {tab!=='sheet' && <div className="parse-bar">
          {parsed.length>0
            ? <><span className="pill-count">{parsed.length} questions ready</span>
                {rwN>0 && <span className="pill-count">{rwN} R&W</span>}
                {mathN>0 && <span className="pill-count">{mathN} Math</span>}</>
            : <span className="pill-warn">No questions yet</span>}
        </div>}

        <div className="create-foot">
          <button className="btn" onClick={onCancel}>Cancel</button>
          <button className="btn" disabled={!canSave} style={{opacity:canSave?1:.45}} onClick={()=>save(false)}>Save test</button>
          <button className="btn btn-primary" disabled={!canSave} onClick={()=>save(true)}>Save &amp; start now</button>
        </div>
        {!canSave && <div className="muted" style={{textAlign:'right',fontSize:12}}>
          {tab==='sheet'
            ? (!name.trim()?'Name the test, add a PDF, and an answer key to enable Start.'
               : !sheetPdf?'Add a PDF to enable Start.' : 'Add an answer key to enable Start.')
            : (name.trim()? 'Add at least one question to enable Start.' : 'Name the test and add questions to enable Start.')}
        </div>}
      </div>
    </div>
  );
}

/* ============================================================
   CALCULATOR (docked, 40% — graceful fallback)
   ============================================================ */
function CalcPanel({onClose}){
  const ref=useRef(null); const [failed,setFailed]=useState(false);
  useEffect(()=>{
    let inst;
    const mount=()=>{ try{ inst=window.Desmos.GraphingCalculator(ref.current,{expressions:true}); }catch(e){ setFailed(true); } };
    if(window.Desmos){ mount(); }
    else{
      const s=document.createElement('script');
      s.src='https://www.desmos.com/api/v1.7/calculator.js?apiKey=dcb31709b452b1cf9dc26972add0fda6';
      s.onload=()=>{ if(window.Desmos&&ref.current) mount(); else setFailed(true); };
      s.onerror=()=>setFailed(true);
      document.body.appendChild(s);
    }
    return ()=>{ try{inst&&inst.destroy&&inst.destroy();}catch(e){} };
  },[]);
  return (
    <div className="calc-dock">
      <div className="cbar"><b style={{fontSize:14}}>Graphing Calculator</b>
        <button className="btn" style={{padding:'4px 14px'}} onClick={onClose}>Close</button></div>
      {failed
        ? <div style={{padding:18,fontSize:13,color:'var(--muted)'}}>The Desmos calculator can't load inside this sandboxed preview. In a deployed build it embeds from <code>desmos.com/api/v1.7/calculator.js</code> with your API key and fills this 40% panel.</div>
        : <div ref={ref} className="cbody"/>}
    </div>
  );
}

/* ============================================================
   TEST RUNNER
   ============================================================ */
function Test({test,onFinish,onExit}){
  const modules=useRef(buildModules(test.questions)).current;
  const [mi,setMi]=useState(0);
  const [qi,setQi]=useState(0);
  const [answers,setAnswers]=useState({});
  const [marked,setMarked]=useState({});
  const [crossed,setCrossed]=useState({});
  const [elimMode,setElimMode]=useState(false);
  const [timeLeft,setTimeLeft]=useState(modules[0]?modules[0].time:0);
  const [hideTimer,setHideTimer]=useState(false);
  const [paused,setPaused]=useState(false);
  const [moreOpen,setMoreOpen]=useState(false);
  const [navOpen,setNavOpen]=useState(false);
  const [screen,setScreen]=useState('q');
  const [annot,setAnnot]=useState(false);
  const [calcOpen,setCalcOpen]=useState(false);
  const passRef=useRef(null);

  const mod=modules[mi];
  const q=mod?mod.questions[qi]:null;

  useEffect(()=>{
    if(paused||screen!=='q') return;
    if(timeLeft<=0){ setScreen('review'); return; }
    const t=setInterval(()=>setTimeLeft(s=>s-1),1000);
    return ()=>clearInterval(t);
  },[paused,screen,timeLeft]);

  const mmss=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  const pick=ci=>setAnswers(a=>({...a,[q.id]:ci}));
  const toggleMark=()=>setMarked(m=>({...m,[q.id]:!m[q.id]}));
  function toggleCross(ci){
    setCrossed(c=>{const cur={...(c[q.id]||{})};cur[ci]=!cur[ci];return {...c,[q.id]:cur};});
    if(answers[q.id]===ci) setAnswers(a=>{const n={...a};delete n[q.id];return n;});
  }
  const goReview=()=>{setNavOpen(false);setScreen('review');};
  const nextQuestion=()=> qi<mod.questions.length-1 ? setQi(qi+1) : goReview();
  const prevQuestion=()=> qi>0 && setQi(qi-1);

  function nextModule(){
    if(mi<modules.length-1){
      const crossing=modules[mi+1].subject!==mod.subject;
      setMi(mi+1);setQi(0);setTimeLeft(modules[mi+1].time);
      setElimMode(false);setAnnot(false);setCalcOpen(false);
      setScreen(crossing?'break':'q');
    } else finish();
  }
  function finish(){
    const per={}; const detail=[];
    modules.forEach(m=>m.questions.forEach(qq=>{
      const chosen=answers[qq.id]; const correct=chosen===qq.correct;
      per[m.subject]=per[m.subject]||{c:0,t:0}; per[m.subject].t++; if(correct)per[m.subject].c++;
      detail.push({subject:m.subject,module:m.moduleNum,kind:qq.kind||'text',
        stem:qq.stem,passage:qq.passage,choices:qq.choices,
        stemImg:qq.stemImg,choiceImgs:qq.choiceImgs,passageImg:qq.passageImg,number:qq.number,
        chosen:chosen==null?null:chosen,correct:qq.correct,explanation:qq.explanation,isRight:correct});
    }));
    const rw=per.rw?scaleSubject(per.rw.c,per.rw.t):null;
    const math=per.math?scaleSubject(per.math.c,per.math.t):null;
    onFinish({id:'h_'+Date.now(),date:Date.now(),testId:test.id,testName:test.name,type:test.type,
      rw,math,total:(rw||0)+(math||0),detail});
  }

  function onPassageMouseUp(){
    if(!annot) return;
    const sel=window.getSelection(); if(!sel||sel.isCollapsed) return;
    try{ const r=sel.getRangeAt(0); const mk=document.createElement('mark'); mk.style.background='#fff3a8';
      r.surroundContents(mk); sel.removeAllRanges(); }catch(e){}
  }

  if(!mod) return <div style={{padding:40}}>This test has no questions. <button className="btn" onClick={onExit}>Back</button></div>;
  const subjName=mod.subject==='rw'?'Reading and Writing':'Math';
  const low=timeLeft<=300;
  const isRW=mod.subject==='rw';

  const Topbar=()=>(<div className="topbar"><span className="star">★</span> Bluebook
    <span className="win">— □ ×</span></div>);

  if(screen==='break') return (
    <div className="overlay"><div className="box">
      <h2>Module complete</h2>
      <p style={{opacity:.85}}>Next: {subjName} — Module {mod.moduleNum}. The timer starts when you continue.</p>
      <button className="btn btn-primary" style={{marginTop:14}} onClick={()=>setScreen('q')}>Begin module</button>
    </div></div>
  );

  if(screen==='review') return (
    <div className="test">
      <Topbar/>
      <div style={{padding:'30px 40px',overflow:'auto'}}>
        <h2 style={{marginTop:0}}>Review — {subjName}, Module {mod.moduleNum}</h2>
        <p className="muted">Filled squares are answered; flags are marked for review.</p>
        <div className="grid" style={{maxWidth:520}}>
          {mod.questions.map((qq,i)=>(
            <button key={qq.id} className={'gcell'+(answers[qq.id]!=null?' ans':'')} onClick={()=>{setScreen('q');setQi(i);}}>
              {i+1}{marked[qq.id]&&<span className="gf">{flag(true)}</span>}
            </button>
          ))}
        </div>
        <div style={{display:'flex',gap:10,marginTop:24}}>
          <button className="btn" onClick={()=>setScreen('q')}>Back to questions</button>
          <button className="btn btn-primary" onClick={nextModule}>{mi<modules.length-1?'Next module':'Finish & score'}</button>
        </div>
      </div>
    </div>
  );

  const QuestionPane=()=>{
    const cross=crossed[q.id]||{};
    const isImg=q.kind==='image';
    return (
      <div>
        <div className="qhead">
          <div className="qnum">{qi+1}</div>
          <button className={'mark'+(marked[q.id]?' active':'')} onClick={toggleMark}>
            <span className="flag">{flag(marked[q.id])}</span> Mark for Review</button>
          <button className={'elim'+(elimMode?' on':'')} onClick={()=>setElimMode(e=>!e)} title="Cross out answers">ABC</button>
        </div>
        {isImg ? <img className="stem-img" src={q.stemImg} alt="question"/> : <MathText className="stem" text={q.stem}/>}
        <div className="choices">
          {(isImg?q.choiceImgs:q.choices).map((c,ci)=>{
            const sel=answers[q.id]===ci; const x=cross[ci];
            return isImg ? (
              <div key={ci} className={'choice-img'+(sel?' sel':'')+(x?' crossed':'')} onClick={()=>{ if(!x)pick(ci); }}>
                <span className="badge">{'ABCD'[ci]}</span>
                <img className="ctext" src={c} alt={'choice '+'ABCD'[ci]}/>
                {elimMode && <button className="strike" onClick={e=>{e.stopPropagation();toggleCross(ci);}}>{x?'↺':'—'}</button>}
              </div>
            ) : (
              <div key={ci} className={'choice'+(sel?' sel':'')+(x?' crossed':'')} onClick={()=>{ if(!x)pick(ci); }}>
                <span className="badge">{'ABCD'[ci]}</span>
                <MathText className="ctext" text={c}/>
                {elimMode && <button className="strike" onClick={e=>{e.stopPropagation();toggleCross(ci);}}>{x?'↺':'—'}</button>}
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  return (
    <div className="test">
      <Topbar/>
      <div className="header">
        <div>
          <div className="sec-name">Section {mod.subject==='rw'?'1':'2'}: {subjName}</div>
          <div className="dir">Directions ▾</div>
        </div>
        <div className="timer-wrap">
          <div className={'timer'+(low&&!hideTimer?' low':'')}>{hideTimer?' ':mmss(timeLeft)}</div>
          <button className="hide-pill" onClick={()=>setHideTimer(h=>!h)}>{hideTimer?'Show':'Hide'}</button>
        </div>
        <div className="right">
          {mod.subject==='math' && <button className={'tool'+(calcOpen?' active':'')} onClick={()=>setCalcOpen(o=>!o)}>
            <span className="ic">{'🖩'}</span>Calculator</button>}
          <button className={'tool'+(annot?' active':'')} onClick={()=>setAnnot(a=>!a)}>
            <span className="ic">{'✎'}</span>Annotate</button>
          <div style={{position:'relative'}}>
            <div className="battery">86% {'🔋'}</div>
            <button className="tool" onClick={()=>setMoreOpen(o=>!o)}><span className="ic">{'⋮'}</span>More</button>
            {moreOpen && (
              <div className="modal">
                <button onClick={()=>{setPaused(true);setMoreOpen(false);}}>Pause test</button>
                <button onClick={()=>{setMoreOpen(false);goReview();}}>Go to review page</button>
                <button onClick={()=>{if(confirm('Exit test? Progress will be lost.'))onExit();}}>Exit test</button>
              </div>
            )}
          </div>
        </div>
      </div>
      <div className="dashes"/>

      <div className="body">
        {isRW ? (
          <>
            <div className="pane left">
              {q.kind==='image'
                ? (q.passageImg ? <img className="stem-img" src={q.passageImg} alt="passage"/>
                                : <div className="muted" style={{fontStyle:'italic'}}>No separate passage for this question.</div>)
                : <div className="passage" ref={passRef} onMouseUp={onPassageMouseUp}
                    dangerouslySetInnerHTML={{__html:mathHTML(q.passage)}}/>}
            </div>
            <div className="pane"><QuestionPane/></div>
          </>
        ) : calcOpen ? (
          <>
            <CalcPanel onClose={()=>setCalcOpen(false)}/>
            <div className="q-col"><div className="q-inner"><QuestionPane/></div></div>
          </>
        ) : (
          <div className="pane" style={{maxWidth:760,margin:'0 auto'}}><QuestionPane/></div>
        )}
      </div>

      <div className="footer">
        <div className="who">{test.name}</div>
        <button className="navbtn" onClick={()=>setNavOpen(o=>!o)}>
          Question {qi+1} of {mod.questions.length} {navOpen?'▾':'▴'}</button>
        <div className="foot-right">
          <button className="btn" onClick={prevQuestion} disabled={qi===0} style={{opacity:qi===0?.5:1}}>Back</button>
          <button className="btn btn-primary" onClick={nextQuestion}>{qi<mod.questions.length-1?'Next':'Review'}</button>
        </div>
        {navOpen && (
          <div className="navpop">
            <h4>{subjName} — Module {mod.moduleNum}</h4>
            <div className="legend"><span>▢ Unanswered</span><span>■ Answered</span><span>{flag(true)} For review</span></div>
            <div className="grid">
              {mod.questions.map((qq,i)=>(
                <button key={qq.id} className={'gcell'+(answers[qq.id]!=null?' ans':'')+(i===qi?' cur':'')}
                  onClick={()=>{setQi(i);setNavOpen(false);}}>
                  {i+1}{marked[qq.id]&&<span className="gf">{flag(true)}</span>}
                </button>
              ))}
            </div>
            <div className="acts"><button className="btn btn-ghost" onClick={goReview}>Go to Review Page</button></div>
          </div>
        )}
      </div>

      {paused && (
        <div className="overlay"><div className="box">
          <h2>Test paused</h2>
          <p style={{opacity:.85}}>The timer is stopped and the question is hidden. Resume when you're ready.</p>
          <button className="btn btn-primary" style={{marginTop:14}} onClick={()=>setPaused(false)}>Resume</button>
        </div></div>
      )}
    </div>
  );
}

/* ============================================================
   ANSWER-SHEET RUNNER (PDF on the right, bubble sheet on the left)
   ============================================================ */
function AnswerSheetRunner({test,onFinish,onExit}){
  const RW=64*60, MATH=70*60, BREAK=15*60;     // R&W 2×32, Math 2×35, 15-min break
  const nums = test.numbers||[];
  const opts = test.optionsPerQuestion||4;
  const rwCount = test.type==='full' ? (test.rwCount||Math.ceil(nums.length/2)) : (test.type==='rw'?nums.length:0);
  const subjectOfIdx = idx => test.type==='full' ? (idx<rwCount?'rw':'math') : test.type;

  const [phase,setPhase]=useState(test.type==='math'?'math':'rw');  // 'rw' | 'break' | 'math'
  const [answers,setAnswers]=useState({});
  const [crossed,setCrossed]=useState({});
  const [marked,setMarked]=useState({});
  const [elim,setElim]=useState(false);
  const [bookOnly,setBookOnly]=useState(false);
  const [timeLeft,setTimeLeft]=useState(test.type==='math'?MATH:RW);
  const [paused,setPaused]=useState(false);
  const [hideTimer,setHideTimer]=useState(false);
  const [moreOpen,setMoreOpen]=useState(false);
  const [calcOpen,setCalcOpen]=useState(false);
  const [pages,setPages]=useState([]);
  const [pdfErr,setPdfErr]=useState('');
  const [loading,setLoading]=useState(true);
  const [zoom,setZoom]=useState(1);

  const mathPhase = test.type==='math' || (test.type==='full' && phase==='math');

  useEffect(()=>{ let alive=true;
    (async()=>{
      if(!test.pdfData){ setLoading(false); setPdfErr('No PDF stored with this test.'); return; }
      try{
        const pdfjsLib=await loadPdfJs();
        const pdf=await pdfjsLib.getDocument({data:dataURLToUint8(test.pdfData)}).promise;
        const imgs=[];
        for(let p=1;p<=pdf.numPages;p++){
          const page=await pdf.getPage(p);
          const c=await renderPdfPageCanvas(page,1300);
          imgs.push(c.toDataURL('image/jpeg',0.85));
          if(alive) setPages(imgs.slice());
        }
      }catch(e){ if(alive) setPdfErr('Could not render the PDF here. The in-chat preview sandbox blocks this \u2014 run the deployed site or downloaded file.'); }
      if(alive) setLoading(false);
    })();
    return ()=>{alive=false;};
  },[]);

  function timeUp(){
    if(test.type==='full' && phase==='rw'){ setPhase('break'); setTimeLeft(BREAK); setCalcOpen(false); }
    else if(phase==='break'){ setPhase('math'); setTimeLeft(MATH); }
    else { submit(); }
  }
  useEffect(()=>{
    if(paused) return;
    if(timeLeft<=0){ timeUp(); return; }
    const t=setInterval(()=>setTimeLeft(s=>s-1),1000);
    return ()=>clearInterval(t);
  },[paused,timeLeft,phase]);

  const mmss=s=>`${Math.floor(s/3600)>0?Math.floor(s/3600)+':':''}${String(Math.floor((s%3600)/60)).padStart(Math.floor(s/3600)>0?2:1,'0')}:${String(s%60).padStart(2,'0')}`;
  const pick=(n,i)=>{
    if(elim){ setCrossed(c=>{const cur={...(c[n]||{})};cur[i]=!cur[i];return{...c,[n]:cur};});
      setAnswers(a=>{ if(a[n]===i){const x={...a};delete x[n];return x;} return a; }); }
    else setAnswers(a=>({...a,[n]:i}));
  };
  const toggleMark=n=>setMarked(m=>({...m,[n]:!m[n]}));

  function submit(){
    const per={}; const detail=[];
    nums.forEach((n,idx)=>{
      const subject=subjectOfIdx(idx);
      const accepted=test.answerKey[n]||[];
      const sel=answers[n];
      const isRight = sel!=null && accepted.includes(sel);
      per[subject]=per[subject]||{c:0,t:0}; per[subject].t++; if(isRight)per[subject].c++;
      detail.push({kind:'sheet',subject,number:n,chosen:sel==null?null:sel,accepted,isRight,optionsPerQuestion:opts});
    });
    const rw=per.rw?scaleSubject(per.rw.c,per.rw.t):null;
    const math=per.math?scaleSubject(per.math.c,per.math.t):null;
    onFinish({id:'h_'+Date.now(),date:Date.now(),testId:test.id,testName:test.name,type:test.type,
      rw,math,total:(rw||0)+(math||0),detail});
  }

  const SECTION = test.type==='full' ? (phase==='math'?'Section 2: Math':'Section 1: Reading and Writing')
    : test.type==='rw' ? 'Reading and Writing' : 'Math';
  // only the current phase's questions are answerable (matches the real test)
  const phaseNums = test.type!=='full' ? nums
    : phase==='math' ? nums.filter((n,i)=>i>=rwCount) : nums.filter((n,i)=>i<rwCount);
  const shown = bookOnly? phaseNums.filter(n=>marked[n]) : phaseNums;
  const answered = phaseNums.filter(n=>answers[n]!=null).length;
  const low=timeLeft<=300;
  const letters='ABCDEFGH';
  const threeCol = calcOpen && mathPhase;

  return (
    <div className="test">
      <div className="topbar"><span className="star">★</span> Bluebook<span className="win">— □ ×</span></div>
      <div className="header">
        <div>
          <div className="sec-name">{SECTION}</div>
          <div className="dir">Answer sheet · read questions on the PDF →</div>
        </div>
        <div className="timer-wrap">
          <div className={'timer'+(low&&!hideTimer?' low':'')}>{hideTimer?' ':mmss(timeLeft)}</div>
          <button className="hide-pill" onClick={()=>setHideTimer(h=>!h)}>{hideTimer?'Show':'Hide'}</button>
        </div>
        <div className="right">
          {mathPhase && <button className={'tool'+(calcOpen?' active':'')} onClick={()=>setCalcOpen(o=>!o)}>
            <span className="ic">🖩</span>Calculator</button>}
          <button className={'tool'+(elim?' active':'')} onClick={()=>setElim(e=>!e)}>
            <span className="ic">⊘</span>Eliminate</button>
          <div style={{position:'relative'}}>
            <div className="battery">86% 🔋</div>
            <button className="tool" onClick={()=>setMoreOpen(o=>!o)}><span className="ic">⋮</span>More</button>
            {moreOpen && (
              <div className="modal">
                <button onClick={()=>{setPaused(true);setMoreOpen(false);}}>Pause test</button>
                <button onClick={()=>{setMoreOpen(false);if(confirm('Submit and score now?'))submit();}}>Submit now</button>
                <button onClick={()=>{if(confirm('Exit test? Progress will be lost.'))onExit();}}>Exit test</button>
              </div>
            )}
          </div>
        </div>
      </div>
      <div className="dashes"/>

      <div className="body">
        {threeCol && <CalcPanel onClose={()=>setCalcOpen(false)}/>}
        <div className="sheet-pane" style={threeCol?{flex:'0 0 30%',width:'30%'}:undefined}>
          <div className="sheet-h">
            <b>Answer sheet</b>
            <label><input type="checkbox" checked={bookOnly} onChange={e=>setBookOnly(e.target.checked)}/> Bookmarked only</label>
          </div>
          {elim && <div className="muted" style={{fontSize:12,marginBottom:8}}>Eliminate mode on — clicking a bubble crosses it out. Turn off to select answers.</div>}
          {shown.map(n=>{
            const cross=crossed[n]||{};
            return (
              <div className={'sheet-row'+(marked[n]?' book':'')} key={n}>
                <div className="srow-num">{n}</div>
                <div className="bubbles">
                  {Array.from({length:opts}).map((_,i)=>{
                    const sel=answers[n]===i; const x=cross[i];
                    return <button key={i} className={'bubble'+(sel?' sel':'')+(x?' crossed':'')}
                      onClick={()=>pick(n,i)}>{letters[i]}</button>;
                  })}
                </div>
                <div className="srow-tools">
                  <button className={'icon-btn'+(marked[n]?' on':'')} title="Bookmark" onClick={()=>toggleMark(n)}>{marked[n]?'⚑':'⚐'}</button>
                </div>
              </div>
            );
          })}
          {shown.length===0 && <div className="muted">No questions to show.</div>}
        </div>

        <div className="pdf-pane">
          <div className="zoombar">
            <span>Zoom</span>
            <button onClick={()=>setZoom(z=>Math.max(0.5,+(z-0.15).toFixed(2)))}>−</button>
            <button onClick={()=>setZoom(z=>Math.min(2.5,+(z+0.15).toFixed(2)))}>+</button>
          </div>
          {loading && <div style={{color:'#fff',textAlign:'center',padding:30}}><span className="spin"/>Rendering your PDF…</div>}
          {pdfErr && <div className="err" style={{maxWidth:560,margin:'0 auto'}}>{pdfErr}</div>}
          {pages.map((src,i)=><img key={i} src={src} alt={'page '+(i+1)} style={{width:(680*zoom)+'px',maxWidth:'none'}}/>)}
        </div>
      </div>

      <div className="sheet-foot">
        <b>{test.name}</b>
        <span className="muted">{answered} of {phaseNums.length} answered{test.type==='full'?(phase==='math'?' (Math)':' (R&W)'):''}</span>
        {test.type==='full' && phase==='rw'
          ? <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={()=>{if(confirm('End the Reading & Writing section and start your 15-minute break?')){setPhase('break');setTimeLeft(BREAK);setCalcOpen(false);}}}>End section → Break</button>
          : <button className="btn btn-primary" style={{marginLeft:'auto'}} onClick={()=>{if(confirm('Submit and score now?'))submit();}}>Submit test</button>}
      </div>

      {phase==='break' && (
        <div className="overlay"><div className="box">
          <h2>Break time</h2>
          <p style={{opacity:.85}}>Take a 15-minute break. The Math section starts automatically when the timer reaches zero, or you can resume early.</p>
          <div style={{fontSize:46,fontWeight:800,margin:'12px 0'}}>{mmss(timeLeft)}</div>
          <button className="btn btn-primary" onClick={()=>{setPhase('math');setTimeLeft(MATH);}}>Resume testing now</button>
        </div></div>
      )}

      {paused && (
        <div className="overlay"><div className="box">
          <h2>Test paused</h2>
          <p style={{opacity:.85}}>The timer is stopped and the page is hidden. Resume when you're ready.</p>
          <button className="btn btn-primary" style={{marginTop:14}} onClick={()=>setPaused(false)}>Resume</button>
        </div></div>
      )}
    </div>
  );
}

/* ============================================================
   RESULTS / REVIEW
   ============================================================ */
function Results({result,onHome}){
  return (
    <div className="results"><div className="results-inner">
      <div className="lp-brand" style={{color:'#0b2a66',marginBottom:18}}><span className="star" style={{color:'var(--gold)'}}>★</span> {result.testName}</div>
      <div className="big-score">
        <div className="muted" style={{fontWeight:800,letterSpacing:'.08em'}}>{TYPES[result.type].name.toUpperCase()}</div>
        <div className="num">{result.total}</div>
        <div className="muted">{result.type==='full'?'out of 1600':'out of 800'}</div>
        <div className="subscores">
          {result.rw!=null && <div className="subscore"><b>{result.rw}</b>Reading & Writing</div>}
          {result.math!=null && <div className="subscore"><b>{result.math}</b>Math</div>}
        </div>
      </div>
      <div className="lp-h2" style={{marginTop:30}}>Answer review</div>
      {result.detail.map((d,i)=>(
        <div className="rev-q" key={i}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <b>{d.subject==='rw'?'R&W':'Math'}{d.kind==='sheet'?'':' · Module '+d.module} · Q{d.kind==='sheet'?d.number:i+1}</b>
            <span className={'tag '+(d.isRight?'ok':'no')}>{d.isRight?'Correct':d.chosen==null?'Skipped':'Incorrect'}</span>
          </div>
          {d.kind==='sheet' ? (
            <div style={{display:'flex',gap:24,alignItems:'center',fontFamily:'var(--serif)',fontSize:16}}>
              <span>Your answer: <b>{d.chosen==null?'—':'ABCDEFGH'[d.chosen]}</b></span>
              <span className="muted">Accepted: <b>{(d.accepted||[]).map(x=>'ABCDEFGH'[x]).join(' or ')||'—'}</b></span>
            </div>
          ) : d.kind==='image' ? (
            <>
              {d.passageImg && <img className="cut-img" style={{marginBottom:8}} src={d.passageImg} alt="passage"/>}
              <img className="cut-img" src={d.stemImg} alt="question"/>
              <div style={{marginTop:8}}>
                {(d.choiceImgs||[]).map((src,ci)=>{
                  const cls=ci===d.correct?'rev-choice correct':(ci===d.chosen?'rev-choice wrong':'rev-choice');
                  return <div className={cls} key={ci} style={{display:'flex',alignItems:'center',gap:8}}>
                    <b>{'ABCD'[ci]}.</b> <img className="cut-img" style={{maxHeight:90}} src={src} alt={'choice '+'ABCD'[ci]}/>
                    {ci===d.correct && <span className="muted"> ← correct</span>}
                    {ci===d.chosen && ci!==d.correct && <span className="muted"> ← your answer</span>}
                  </div>;
                })}
              </div>
            </>
          ) : (
            <>
              {d.passage && <div className="muted" style={{fontFamily:'var(--serif)',fontSize:14,marginBottom:6}}
                dangerouslySetInnerHTML={{__html:mathHTML(d.passage).slice(0,400)}}/>}
              <MathText style={{fontFamily:'var(--serif)'}} text={d.stem}/>
              <div style={{marginTop:8}}>
                {d.choices.map((c,ci)=>{
                  const cls=ci===d.correct?'rev-choice correct':(ci===d.chosen?'rev-choice wrong':'rev-choice');
                  return <div className={cls} key={ci}><b>{'ABCD'[ci]}.</b> <MathText text={c}/>
                    {ci===d.correct && <span className="muted"> ← correct</span>}
                    {ci===d.chosen && ci!==d.correct && <span className="muted"> ← your answer</span>}
                  </div>;
                })}
              </div>
            </>
          )}
          {d.explanation && <div className="muted" style={{marginTop:8,fontSize:14}}><b>Why:</b> <MathText text={d.explanation}/></div>}
        </div>
      ))}
      <button className="btn btn-primary" style={{marginTop:10}} onClick={onHome}>Back to dashboard</button>
    </div></div>
  );
}

/* ============================================================
   APP ROOT
   ============================================================ */
function App(){
  const [view,setView]=useState('loading');
  const [tests,setTests]=useState([]);
  const [history,setHistory]=useState([]);
  const [createType,setCreateType]=useState('full');
  const [activeTest,setActiveTest]=useState(null);
  const [result,setResult]=useState(null);

  useEffect(()=>{(async()=>{
    let t=await Store.get('sat_tests');
    const h=await Store.get('sat_history');
    if(!t||!t.length){ t=[DEMO]; await Store.set('sat_tests',t); }
    setTests(t); if(h)setHistory(h);
    setView('home');
  })();},[]);

  async function saveTest(test,start){
    let toStore=test;
    if(test.format==='sheet' && test.pdfData){
      await Store.set('sat_pdf_'+test.id, test.pdfData);   // big PDF gets its own key
      toStore={...test, pdfData:undefined, hasPdf:true};
    }
    const t=[toStore,...tests]; setTests(t); await Store.set('sat_tests',t);
    if(start){ setActiveTest(test); setView(test.format==='sheet'?'sheet':'test'); } else setView('home');
  }
  async function deleteTest(id){
    if(!confirm('Delete this test permanently?')) return;
    const t=tests.filter(x=>x.id!==id); setTests(t); await Store.set('sat_tests',t);
    try{ await Store.set('sat_pdf_'+id,null); }catch(e){}
  }
  async function finish(r){
    const h=[r,...history]; setHistory(h); await Store.set('sat_history',h);
    setResult(r); setView('results');
  }
  function reviewTest(testId){
    const r=history.find(x=>x.testId===testId);
    if(r){ setResult(r); setView('results'); }
  }
  async function startTest(t){
    let test=t;
    if(t.format==='sheet' && !t.pdfData){
      const pdf=await Store.get('sat_pdf_'+t.id);
      test={...t, pdfData:pdf};
    }
    setActiveTest(test); setView(t.format==='sheet'?'sheet':'test');
  }

  if(view==='loading') return <div style={{padding:40,color:'#5b6573'}}>Loading…</div>;
  if(view==='home') return <Landing tests={tests} history={history}
      onCreate={(k)=>{setCreateType(k);setView('create');}}
      onStart={startTest}
      onDelete={deleteTest} onReview={reviewTest}/>;
  if(view==='create') return <CreateView type={createType} onCancel={()=>setView('home')} onSave={saveTest}/>;
  if(view==='test') return <Test test={activeTest} onFinish={finish} onExit={()=>setView('home')}/>;
  if(view==='sheet') return <AnswerSheetRunner test={activeTest} onFinish={finish} onExit={()=>setView('home')}/>;
  if(view==='results') return <Results result={result} onHome={()=>setView('home')}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
